[project]
name = "fdp-ui"
version = "0.1.0"
description = "NiceGUI UI: pipeline builder, raw/unified preview, mapping/lineage views"
requires-python = ">=3.14"
dependencies = [
    "fdp-shared",
    "fdp-api",
    "nicegui>=2.7",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fdp_ui"]
