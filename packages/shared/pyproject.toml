[project]
name = "fdp-shared"
version = "0.1.0"
description = "Shared domain primitives, DTOs, Mongo client, config, logging"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "pymongo>=4.9",
    "structlog>=24.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fdp_shared"]