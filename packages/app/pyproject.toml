[project]
name = "fdp-app"
version = "0.1.0"
description = "Composition root: wires the stack, builds FastAPI, ASGI + console entry point"
requires-python = ">=3.14"
dependencies = [
    "fdp-shared",
    "fdp-ingestion",
    "fdp-unification",
    "fdp-api",
    "fdp-ui",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
]

[project.scripts]
# The single console script that boots the whole stack.
fdp = "fdp_app.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fdp_app"]
