[project]
name = "fdp-api"
version = "0.1.0"
description = "FastAPI routers, read/query services, DTO mapping, error handling"
requires-python = ">=3.14"
dependencies = [
    "fdp-shared",
    "fdp-ingestion",
    "fdp-unification",
    "fastapi>=0.115",
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fdp_api"]
