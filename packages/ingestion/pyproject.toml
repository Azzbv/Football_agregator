[project]
name = "fdp-ingestion"
version = "0.1.0"
description = "Source adapters (StatsBomb, openfootball, FBref, Understat) behind SourcePort"
requires-python = ">=3.14"
dependencies = [
    "fdp-shared",
    "httpx>=0.27",
    "tenacity>=9.0",
    "aiolimiter>=1.1",
    "selectolax>=0.3.21",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fdp_ingestion"]
