[project]
name = "fdp-unification"
version = "0.1.0"
description = "ACL mappers + ETL transform engine + pipeline orchestration"
requires-python = ">=3.14"
dependencies = [
    "fdp-shared",
    "fdp-ingestion",
    "pydantic>=2.9",
    "pymongo>=4.9",
    "jsonpath-ng>=1.6",
    "tenacity>=9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fdp_unification"]
